<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatty — AI Customer Service</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
    }
    .nav {
      background: #fff;
      border-bottom: 1px solid #e5e5e7;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav h1 { font-size: 20px; font-weight: 600; }
    .nav h1 span { color: #6c5ce7; }
    .nav .user { font-size: 14px; color: #86868b; }
    .container { max-width: 1200px; margin: 0 auto; padding: 32px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      border: 1px solid #e5e5e7;
    }
    .card h3 { font-size: 14px; color: #86868b; margin-bottom: 8px; }
    .card .value { font-size: 32px; font-weight: 700; }
    .card .plan-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      background: #f0f0f5;
      color: #6c5ce7;
    }
    .card.starter .plan-badge { background: #e8e8ed; color: #666; }
    .card.growth .plan-badge { background: #e8f5e9; color: #2e7d32; }
    .card.pro .plan-badge { background: #fff3e0; color: #e65100; }
    .section { margin-top: 32px; }
    .section h2 { font-size: 18px; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 12px 16px; font-size: 13px; color: #86868b; border-bottom: 1px solid #e5e5e7; }
    td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid #f0f0f2; }
    .status { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 500; }
    .status.unpaid { background: #fff3e0; color: #e65100; }
    .status.paid { background: #e8f5e9; color: #2e7d32; }
    .status.overdue { background: #ffebee; color: #c62828; }
    .btn {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      border: none;
      background: #6c5ce7;
      color: #fff;
    }
    .btn:hover { background: #5a4bd1; }
    .btn-outline {
      background: transparent;
      color: #6c5ce7;
      border: 1px solid #6c5ce7;
    }
    .btn-outline:hover { background: #f5f3ff; }
    .loading { text-align: center; padding: 60px; color: #86868b; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .loading span { animation: pulse 1.5s infinite; }
    .auth-form {
      max-width: 400px; margin: 80px auto;
      background: #fff; padding: 40px;
      border-radius: 16px; border: 1px solid #e5e5e7;
    }
    .auth-form h2 { margin-bottom: 24px; }
    .auth-form input {
      width: 100%; padding: 12px 16px;
      border: 1px solid #e5e5e7; border-radius: 8px;
      font-size: 14px; margin-bottom: 16px;
    }
    .auth-form input:focus { outline: none; border-color: #6c5ce7; }
    .auth-form .btn { width: 100%; }
    .auth-form .toggle { text-align: center; margin-top: 16px; font-size: 14px; color: #86868b; }
    .auth-form .toggle a { color: #6c5ce7; cursor: pointer; text-decoration: underline; }
    .error { color: #c62828; font-size: 14px; margin-bottom: 16px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const API = '/api';
    let state = { token: null, workspaceId: null, view: 'login' };

    function getToken() { return localStorage.getItem('chatty_token'); }
    function setToken(t) { localStorage.setItem('chatty_token', t); }
    function getWsId() { return localStorage.getItem('chatty_ws'); }
    function setWsId(id) { localStorage.setItem('chatty_ws', id); }

    state.token = getToken();
    state.workspaceId = getWsId();

    async function api(path, opts = {}) {
      const headers = { 'Content-Type': 'application/json' };
      const token = getToken();
      if (token) headers['Authorization'] = `Bearer ${token}`;
      const res = await fetch(`${API}${path}`, { ...opts, headers: { ...headers, ...opts.headers } });
      if (res.status === 401) { state.token = null; localStorage.removeItem('chatty_token'); render(); }
      return res.json();
    }

    async function render() {
      const token = getToken();
      if (!token) { renderAuth(); return; }
      try {
        const stats = await api('/dashboard/stats');
        if (stats.error) { renderAuth(); return; }
        renderDashboard(stats);
      } catch { renderAuth(); }
    }

    function renderAuth() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="auth-form" id="authForm">
          <h2>Chatty <span style="color:#6c5ce7">●</span></h2>
          <p style="color:#86868b;margin-bottom:24px;">AI Customer Service Platform</p>
          <div id="authError" class="error hidden"></div>
          <input id="authEmail" type="email" placeholder="Email" required>
          <input id="authPassword" type="password" placeholder="Password" required>
          <input id="authBusiness" class="hidden" placeholder="Business Name" required>
          <button class="btn" onclick="handleAuth()" id="authBtn">Sign In</button>
          <div class="toggle">
            <span id="authToggle">Don't have an account? <a onclick="toggleAuthMode()">Sign Up</a></span>
          </div>
        </div>
      `;
    }

    let authMode = 'login';
    function toggleAuthMode() {
      authMode = authMode === 'login' ? 'signup' : 'login';
      document.getElementById('authBtn').textContent = authMode === 'login' ? 'Sign In' : 'Create Account';
      document.getElementById('authToggle').innerHTML = authMode === 'login'
        ? `Don't have an account? <a onclick="toggleAuthMode()">Sign Up</a>`
        : `Already have an account? <a onclick="toggleAuthMode()">Sign In</a>`;
      document.getElementById('authBusiness').classList.toggle('hidden', authMode === 'login');
    }

    async function handleAuth() {
      const email = document.getElementById('authEmail').value;
      const password = document.getElementById('authPassword').value;
      const errEl = document.getElementById('authError');
      errEl.classList.add('hidden');

      if (!email || !password) { errEl.textContent = 'Email and password required'; errEl.classList.remove('hidden'); return; }

      if (authMode === 'signup') {
        const business = document.getElementById('authBusiness').value;
        if (!business) { errEl.textContent = 'Business name required'; errEl.classList.remove('hidden'); return; }
        const res = await api('/auth/signup', { method: 'POST', body: JSON.stringify({ email, password, businessName: business }) });
        if (res.error) { errEl.textContent = res.error; errEl.classList.remove('hidden'); return; }
        setToken(res.token); setWsId(res.workspaceId);
      } else {
        const res = await api('/auth/login', { method: 'POST', body: JSON.stringify({ email, password }) });
        if (res.error) { errEl.textContent = res.error; errEl.classList.remove('hidden'); return; }
        setToken(res.token); setWsId(res.workspaceId);
      }
      render();
    }

    function renderDashboard(stats) {
      const plan = stats.plan || 'starter';
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="nav">
          <h1><span>Chatty</span> ● ${stats.businessName || 'Dashboard'}</h1>
          <div class="user">
            <span class="plan-badge" style="margin-right:12px">${plan}</span>
            <a href="#" onclick="logout()" style="color:#86868b;text-decoration:none">Sign Out</a>
          </div>
        </div>
        <div class="container">
          <div class="stats">
            <div class="card ${plan}">
              <h3>Plan</h3>
              <div class="plan-badge">${plan}</div>
            </div>
            <div class="card">
              <h3>Customers</h3>
              <div class="value">${stats.customers || 0}</div>
            </div>
            <div class="card">
              <h3>AI Conversations</h3>
              <div class="value">${stats.usage?.aiConversations || 0}</div>
            </div>
            <div class="card">
              <h3>Invoices</h3>
              <div class="value">${stats.invoices || 0}</div>
              ${stats.unpaidInvoices > 0 ? `<p style="color:#e65100;font-size:13px;margin-top:4px">${stats.unpaidInvoices} unpaid</p>` : ''}
            </div>
          </div>
          <div class="section">
            <h2>Recent Conversations</h2>
            <table><thead><tr><th>Customer</th><th>Channel</th><th>Messages</th><th>Last Activity</th></tr></thead><tbody id="convosBody"><tr><td colspan="4" style="text-align:center;color:#86868b">Loading...</td></tr></tbody></table>
          </div>
          <div class="section">
            <h2>Invoices</h2>
            <table><thead><tr><th>#</th><th>Customer</th><th>Amount</th><th>Status</th><th>Due Date</th></tr></thead><tbody id="invoicesBody"><tr><td colspan="5" style="text-align:center;color:#86868b">Loading...</td></tr></tbody></table>
          </div>
        </div>
      `;
      loadConversations();
      loadInvoices();
    }

    async function loadConversations() {
      const convos = await api('/dashboard/conversations');
      const body = document.getElementById('convosBody');
      if (!convos.length) { body.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#86868b">No conversations yet</td></tr>'; return; }
      body.innerHTML = convos.slice(0, 10).map(c => `
        <tr>
          <td>${c.customerName}</td>
          <td>${c.channel}</td>
          <td>${c.messageCount}</td>
          <td>${c.lastMessage ? new Date(c.lastMessage.timestamp).toLocaleDateString('id-ID') : '-'}</td>
        </tr>
      `).join('');
    }

    async function loadInvoices() {
      const invoices = await api('/dashboard/invoices');
      const body = document.getElementById('invoicesBody');
      if (!invoices.length) { body.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#86868b">No invoices yet</td></tr>'; return; }
      body.innerHTML = invoices.slice(0, 10).map(inv => `
        <tr>
          <td>${inv.number || inv.id?.slice(0, 8)}</td>
          <td>${inv.customerName || 'N/A'}</td>
          <td>Rp ${Number(inv.total || 0).toLocaleString('id-ID')}</td>
          <td><span class="status ${inv.status}">${inv.status}</span></td>
          <td>${inv.dueDate ? new Date(inv.dueDate).toLocaleDateString('id-ID') : '-'}</td>
        </tr>
      `).join('');
    }

    function logout() {
      localStorage.removeItem('chatty_token');
      localStorage.removeItem('chatty_ws');
      render();
    }

    render();
  </script>
</body>
</html>
